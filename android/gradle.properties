org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Windows: 项目在 D: 盘、Pub 缓存在 C: 盘时，Kotlin 增量编译会因跨盘符路径失败
kotlin.incremental=false
kotlin.incremental.android=false
android.enableJetifier=true
# Enable Flutter built-in Kotlin after app migration
android.builtInKotlin=true
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
