name: time_manager
description: "A new Flutter project."
publish_to: "none"
version: 1.54.0+1

# 添加下面这段环境配置
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  logger: ^2.6.2
  shared_preferences: ^2.2.2
  flutter_slidable: ^4.0.3
  reorderables: ^0.6.0
  fl_chart: ^1.2.0 # 强大的图表库
  intl: ^0.20.2
  http: ^1.6.0
  home_widget: ^0.9.2
  file_picker: ^11.0.2
  package_info_plus: ^9.0.1
  flutter_secure_storage: ^10.3.1
  url_launcher: ^6.2.5
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png" # 你设计好的图标路径
  min_sdk_android: 21
